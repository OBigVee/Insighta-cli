name: Build and Push CLI to Docker Hub

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docker-compose.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # We tag it with 'latest' and the commit SHA for versioning
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/insighta-cli:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/insighta-cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
